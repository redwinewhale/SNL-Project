<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Guardian Web Game</title>
</head>
<body>
  <div id="desktop-shell" aria-hidden="true">
    <div class="desktop-gradient"></div>
    <div class="desktop-icons">
      <div class="desktop-icon">
        <div class="icon-art recycle-icon"></div>
        <span>휴지통</span>
      </div>
      <div class="desktop-icon">
        <div class="icon-art folder-icon"></div>
        <span>문서</span>
      </div>
      <div class="desktop-icon">
        <div class="icon-art browser-icon"></div>
        <span>인터넷</span>
      </div>
      <div class="desktop-icon">
        <div class="icon-art drive-icon"></div>
        <span>내 PC</span>
      </div>
    </div>

    <div class="taskbar">
      <div class="taskbar-left">
        <div class="windows-badge" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="taskbar-center">
        <div class="search-pill">
          <span class="search-icon"></span>
          <span>검색</span>
        </div>
        <div class="taskbar-app">
          <span class="app-mark browser-mark"></span>
        </div>
        <div class="taskbar-app">
          <span class="app-mark doc-mark"></span>
        </div>
        <div class="taskbar-app">
          <span class="app-mark folder-mark"></span>
        </div>
        <div class="taskbar-app">
          <span class="app-mark chat-mark"></span>
        </div>
      </div>

      <div class="taskbar-right">
        <div class="tray-icons">
          <span class="tray-icon wifi-icon"></span>
          <span class="tray-icon volume-icon"></span>
          <span class="tray-icon battery-icon"></span>
        </div>
        <div class="clock-block">
          <strong id="taskbarTime">00:00</strong>
          <span id="taskbarDate">0000-00-00</span>
        </div>
      </div>
    </div>
  </div>

  <div id="game-container"></div>
  <div id="ui-layer">
    <div id="mailModal" class="hidden">
        <div class="mail-content">
            <h2 class="mail-title">안내 메일</h2>
            <hr>
            <p>보안 점검 프로그램(보안.exe)을 실행하시겠습니까?(게임 설명 들어가야함)</p>
            <button id="exeButton">보안.exe 실행</button>
        </div>
    </div>

    <div id="quizModal" class="terminal-modal hidden">
        <div class="terminal-header">
            <span id="quizTitle">> TARGET_직원 데이터 접속 중...</span>
            <button id="closeQuizBtn" class="close-btn">X</button>
        </div>
        
        <div class="terminal-body">
            <div id="quizQuestionText">> 서버 연결 중...</div>
            
            <div id="quizChoicesContainer" class="choices-container">
                </div>
        </div>
    </div>

    <div id="errorModal" class="hidden">
        <div class="error-content" style="background-color: #1a1a1a; border: 2px solid #ff4444; padding: 24px; border-radius: 8px; color: white; text-align: center; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);">
            <h2 style="color: #ff4444; margin-top: 0;">[SYSTEM ERROR] 접근 거부됨</h2>
            <hr style="border-color: #555;">
            <p>현재 시스템이 잠겨 있습니다.<br>우측 하단의 <strong>[긴급] 알림 메일</strong>을 먼저 확인해 주십시오.</p>
            <button id="closeErrorBtn" style="margin-top: 16px; padding: 8px 16px; background-color: #ff4444; color: white; border: none; border-radius: 4px; cursor: pointer;">확인</button>
        </div>
    </div>
    
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
