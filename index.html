<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Guardian Web Game</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        /* UI 레이어: Phaser 위에 겹쳐지도록 설정 */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* 평소엔 클릭이 Phaser로 전달되도록 함 */
            z-index: 10;
        }
        .modal { pointer-events: auto; } /* 모달이 뜰 때만 클릭 가능하게 */
    </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-layer">
    
    <div id="mailModal" class="hidden">
        <div class="mail-content">
            <h2 class="mail-title">안내 메일</h2>
            <hr>
            <p>보안 점검 프로그램(보안.exe)을 실행하시겠습니까?</p>
            <button id="exeButton">보안.exe 실행</button>
        </div>
    </div>

    <div id="quizModal" class="terminal-modal hidden">
        <div class="terminal-header">
            <span id="quizTitle">> TARGET_직원 데이터 접속 중...</span>
            <button id="closeQuizBtn" class="close-btn">X</button>
        </div>
        
        <div class="terminal-body">
            <div id="quizQuestionText">> 서버 연결 중...</div>
            
            <div id="quizChoicesContainer" class="choices-container">
                </div>
        </div>
    </div>

</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
